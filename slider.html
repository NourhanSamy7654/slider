<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Slide Show Game</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
      }

      h2 {
        margin-top: 20px;
      }

      .slider {
        width: 600px;
        margin: 20px auto;
        border: 5px solid gold;
        padding: 10px;
        background: #000;
      }

      .slider img {
        width: 100%;
        height: 350px;
        object-fit: cover;
      }

      .controls {
        margin-top: 15px;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 5px;
        cursor: pointer;
        border: none;
        color: #fff;
      }

      .prev,
      .next {
        background: orange;
      }

      .play {
        background: green;
      }

      .stop {
        background: red;
      }
    </style>
  </head>
  <body>
    <h2>Slider</h2>

    <div class="slider">
      <img id="slide" src="images/flower1 (1).jpg" />
    </div>

    <div class="controls">
      <button class="prev" id="prevSlider">&lt;</button>
      <button class="play" id="playSlider">Play</button>
      <button class="stop" id="stop">Stop</button>
      <button class="next" id="nextslider">&gt;</button>
    </div>
    <!-- onclick="prevSlide()" -->
    <script>
      var images = [
        "images/flower1 (1).jpg",
        "images/flower1 (2).jpg",
        "images/flower1 (3).jpg",
        "images/flower1 (4).jpg",
      ];

      var index = 0;
      var interval;

      var slide = document.getElementById("slide");
      var prev = document.getElementById("prevSlider");
      var play = document.getElementById("playSlider");
      var next = document.getElementById("nextslider");
      var stop = document.getElementById("stop");

      function showImage() {
        slide.src = images[index];
      }
      function nextSlide() {
        index++;
        if (index >= images.length) {
          index = 0;
        }
        showImage();
      }
      next.addEventListener("click", nextSlide);

      prev.addEventListener("click", function () {
        index--;
        if (index < 0) {
          index = images.length - 1;
        }
        showImage();
      });
      play.addEventListener("click", function () {
        if (!interval) {
          interval = setInterval(nextSlide, 1000);
        }
      });

      stop.addEventListener("click", function () {
        clearInterval(interval);
        interval = null;
      });
    </script>
  </body>
</html>

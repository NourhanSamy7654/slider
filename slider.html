<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Slide Show</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Slider</h2>

    <div class="slider">
      <img id="slide" src="images/flower1 (1).jpg" />
    </div>

    <div class="controls">
      <button class="prev" id="prevSlider">&lt;</button>
      <button class="play" id="playSlider">Play</button>
      <button class="stop" id="stop">Stop</button>
      <button class="next" id="nextslider">&gt;</button>
    </div>
    <!-- onclick="prevSlide()" -->
    <script src="script.js"></script>
  </body>
</html>
